name: Motion Security Monitor
description: >
  PIR + ultrasonic proximity monitor with USB-camera person detection,
  buzzer alerts, and a live web dashboard (video feed + sensor log).
icon: 🚨
version: "1.0.0"

# Bricks are added automatically when you add them via the App Lab UI
# ("Bricks" tab -> +). They're listed here so the app is reproducible
# from source. If App Lab reformats this block when you open the app,
# that's expected -- let it manage the Brick section, and only hand-edit
# the parts above (name/description/icon).
bricks:
  arduino:video_object_detection:
    model: object-detection # default COCO-style model; includes a "person" class
  arduino:web_ui: {}
